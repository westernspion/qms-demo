services:

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: qms
      POSTGRES_USER: qms
      POSTGRES_PASSWORD: qms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qms"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    volumes:
      - ollamadata:/root/.ollama
    # On GPU host, add: deploy.resources.reservations.devices

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: qms
      DB_USER: qms
      DB_PASSWORD: qms
      OLLAMA_HOST: http://ollama:11434
      EMBED_MODEL: nomic-embed-text
      LLM_MODEL: qwen2.5:3b
      CHUNK_SIZE: 512
      CHUNK_OVERLAP: 64
      TOP_K_CHUNKS: 5
      FRONTEND_ORIGIN: http://localhost:80
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  ollamadata:
